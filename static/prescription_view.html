<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digital Prescription — MedBot</title>
  <style>
    :root{
      --blue:#1565C0;--blue-d:#0D47A1;--text:#1A1A2E;--muted:#607D8B;
      --border:#DCE4F0;--green:#2E7D32;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f9;color:var(--text)}

    /* Screen styles */
    .page-wrapper{max-width:760px;margin:32px auto;padding:0 16px}

    .action-bar{
      display:flex;align-items:center;gap:12px;margin-bottom:20px;
    }
    .back-btn{
      padding:8px 16px;border:1.5px solid var(--border);border-radius:8px;
      background:#fff;color:var(--muted);font-size:13px;cursor:pointer;text-decoration:none;
    }
    .back-btn:hover{background:#f0f4f9}
    .print-btn{
      margin-left:auto;padding:9px 22px;background:var(--blue);color:#fff;
      border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;
    }
    .print-btn:hover{background:#1E88E5}

    /* Prescription card */
    .rx-card{
      background:#fff;border-radius:16px;padding:40px;
      box-shadow:0 4px 24px rgba(13,71,161,.1);
    }

    /* Header */
    .rx-header{
      display:flex;align-items:flex-start;justify-content:space-between;
      padding-bottom:20px;border-bottom:2px solid var(--blue-d);margin-bottom:24px;
    }
    .rx-hospital-logo{font-size:36px}
    .rx-hospital-name{font-size:20px;font-weight:800;color:var(--blue-d);margin-top:2px}
    .rx-hospital-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .rx-right{text-align:right}
    .rx-id{font-size:22px;font-weight:800;color:var(--blue);margin-bottom:4px}
    .rx-date{font-size:12px;color:var(--muted)}

    /* Doctor / Patient info */
    .rx-info-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    .rx-info-box{background:#f8fafc;border-radius:10px;padding:14px 16px;border:1px solid var(--border)}
    .rx-info-box h4{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;
      color:var(--muted);margin-bottom:10px}
    .rx-info-item{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
    .rx-info-label{font-size:11px;color:var(--muted);min-width:70px;flex-shrink:0}
    .rx-info-val{font-size:13px;font-weight:600;color:var(--text)}

    /* Diagnosis */
    .rx-section{margin-bottom:24px}
    .rx-section-title{
      font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px;
      color:var(--blue-d);padding-bottom:8px;border-bottom:1.5px solid #dbeafe;margin-bottom:14px;
    }
    .rx-diagnosis-box{
      background:#eff6ff;border:1.5px solid #bfdbfe;border-radius:10px;
      padding:12px 16px;font-size:14px;color:var(--text);line-height:1.6;
    }

    /* Medications table */
    .rx-meds-table{width:100%;border-collapse:collapse;font-size:13px}
    .rx-meds-table th{
      background:var(--blue-d);color:#fff;padding:10px 12px;text-align:left;
      font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
    }
    .rx-meds-table th:first-child{border-top-left-radius:8px}
    .rx-meds-table th:last-child{border-top-right-radius:8px}
    .rx-meds-table td{
      padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;
    }
    .rx-meds-table tr:last-child td{border-bottom:none}
    .rx-meds-table tr:nth-child(even) td{background:#f8fafc}
    .med-name{font-weight:700;color:var(--text)}

    /* Instructions & Follow-up */
    .rx-text-box{
      background:#fefce8;border:1.5px solid #fde68a;border-radius:10px;
      padding:12px 16px;font-size:13.5px;color:#78350f;line-height:1.7;
    }
    .rx-followup-box{
      background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;
      padding:12px 16px;font-size:13.5px;color:#166534;line-height:1.6;
    }

    /* Signature */
    .rx-sig-row{
      display:flex;justify-content:space-between;align-items:flex-end;
      border-top:2px dashed #e2e8f0;padding-top:24px;margin-top:24px;
    }
    .rx-disclaimer{font-size:10.5px;color:var(--muted);max-width:360px;line-height:1.6}
    .rx-sig-box{text-align:center}
    .rx-sig-line{width:200px;border-bottom:2px solid var(--text);margin-bottom:6px}
    .rx-sig-name{font-size:13px;font-weight:700;color:var(--text)}
    .rx-sig-role{font-size:11px;color:var(--muted)}
    .rx-stamp{
      width:72px;height:72px;border:2px solid var(--blue-d);border-radius:50%;
      display:flex;align-items:center;justify-content:center;flex-direction:column;
      font-size:10px;font-weight:700;color:var(--blue-d);text-align:center;
      margin:0 auto 8px;
    }

    .not-found{text-align:center;padding:60px 20px;color:var(--muted)}
    .not-found h2{font-size:20px;margin-bottom:10px}

    /* ── Print styles ── */
    @media print{
      body{background:#fff}
      .action-bar{display:none}
      .page-wrapper{margin:0;padding:0;max-width:none}
      .rx-card{box-shadow:none;border-radius:0;padding:30px}
    }
  </style>
</head>
<body>

<div class="page-wrapper">

  <div class="action-bar">
    <a href="javascript:history.back()" class="back-btn">← Back</a>
    <span id="rx-badge" style="font-size:12px;color:var(--muted)">Loading…</span>
    <button class="print-btn" onclick="window.print()">🖨️ Print / Download PDF</button>
  </div>

  <div id="rx-card-wrapper">
    <div class="not-found" id="loading-state">
      <p>Loading prescription…</p>
    </div>
  </div>

</div>

<script>
const params = new URLSearchParams(location.search);
const rxId = params.get('id');

async function loadPrescription(){
  if(!rxId){
    document.getElementById('rx-card-wrapper').innerHTML = `
      <div class="not-found"><h2>No prescription ID</h2><p>Add ?id=X to the URL</p></div>`;
    return;
  }

  let rx;
  try{
    const res = await fetch(`/api/prescriptions/${rxId}`);
    if(!res.ok){ throw new Error('Not found'); }
    rx = await res.json();
  } catch{
    document.getElementById('rx-card-wrapper').innerHTML = `
      <div class="not-found"><h2>Prescription not found</h2><p>The prescription #${rxId} could not be found.</p></div>`;
    return;
  }

  document.title = `Rx #${rx.id} — ${rx.patient_name}`;
  document.getElementById('rx-badge').textContent = `Prescription #${rx.id} · Issued ${fmtDate(rx.issued_at)}`;

  let medications = [];
  try{ medications = JSON.parse(rx.medications); } catch{}

  const medsRows = medications.map((m,i) => `
    <tr>
      <td>${i+1}</td>
      <td><span class="med-name">${esc(m.name||'—')}</span></td>
      <td>${esc(m.dosage||'—')}</td>
      <td>${esc(m.frequency||'—')}</td>
      <td>${esc(m.duration||'—')}</td>
      <td>${esc(m.route||'Oral')}</td>
    </tr>`).join('');

  document.getElementById('rx-card-wrapper').innerHTML = `
    <div class="rx-card">

      <!-- Header -->
      <div class="rx-header">
        <div>
          <div class="rx-hospital-logo">🏥</div>
          <div class="rx-hospital-name">MedBot Health Clinic</div>
          <div class="rx-hospital-sub">Digital Prescription · Verified Medical Record</div>
        </div>
        <div class="rx-right">
          <div class="rx-id">Rx #${rx.id}</div>
          <div class="rx-date">Date: ${fmtDate(rx.issued_at)}</div>
          ${rx.room_id ? `<div class="rx-date" style="margin-top:2px">Room: ${esc(rx.room_id)}</div>` : ''}
        </div>
      </div>

      <!-- Doctor / Patient info -->
      <div class="rx-info-row">
        <div class="rx-info-box">
          <h4>🩺 Doctor Details</h4>
          <div class="rx-info-item"><span class="rx-info-label">Name</span><span class="rx-info-val">Dr. ${esc(rx.doctor_name)}</span></div>
          ${rx.doctor_specialization ? `<div class="rx-info-item"><span class="rx-info-label">Speciality</span><span class="rx-info-val">${esc(rx.doctor_specialization)}</span></div>` : ''}
        </div>
        <div class="rx-info-box">
          <h4>👤 Patient Details</h4>
          <div class="rx-info-item"><span class="rx-info-label">Name</span><span class="rx-info-val">${esc(rx.patient_name)}</span></div>
          ${rx.patient_age ? `<div class="rx-info-item"><span class="rx-info-label">Age</span><span class="rx-info-val">${esc(rx.patient_age)} yrs</span></div>` : ''}
          ${rx.patient_gender ? `<div class="rx-info-item"><span class="rx-info-label">Gender</span><span class="rx-info-val">${esc(rx.patient_gender)}</span></div>` : ''}
        </div>
      </div>

      <!-- Diagnosis -->
      ${rx.diagnosis ? `
      <div class="rx-section">
        <div class="rx-section-title">Diagnosis</div>
        <div class="rx-diagnosis-box">${esc(rx.diagnosis)}</div>
      </div>` : ''}

      <!-- Medications -->
      <div class="rx-section">
        <div class="rx-section-title">Prescribed Medications</div>
        <table class="rx-meds-table">
          <thead><tr>
            <th>#</th><th>Medication</th><th>Dosage</th><th>Frequency</th><th>Duration</th><th>Route</th>
          </tr></thead>
          <tbody>${medsRows || '<tr><td colspan="6" style="text-align:center;color:var(--muted)">No medications listed</td></tr>'}</tbody>
        </table>
      </div>

      <!-- Instructions -->
      ${rx.instructions ? `
      <div class="rx-section">
        <div class="rx-section-title">Instructions</div>
        <div class="rx-text-box">${esc(rx.instructions).replace(/\n/g,'<br>')}</div>
      </div>` : ''}

      <!-- Follow-up -->
      ${rx.follow_up ? `
      <div class="rx-section">
        <div class="rx-section-title">Follow-up</div>
        <div class="rx-followup-box">📅 ${esc(rx.follow_up)}</div>
      </div>` : ''}

      <!-- Signature -->
      <div class="rx-sig-row">
        <div class="rx-disclaimer">
          This is a digitally generated prescription issued via MedBot Health Platform.
          It is valid for the stated duration. Present this to your pharmacist.
          For emergencies, contact your nearest hospital immediately.
        </div>
        <div class="rx-sig-box">
          <div class="rx-stamp">
            <span>✓</span>
            <span>VERIFIED</span>
          </div>
          <div class="rx-sig-line"></div>
          <div class="rx-sig-name">Dr. ${esc(rx.doctor_name)}</div>
          <div class="rx-sig-role">${esc(rx.doctor_specialization || 'Medical Doctor')}</div>
        </div>
      </div>

    </div><!-- /rx-card -->
  `;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtDate(iso){
  if(!iso) return '—';
  try{
    return new Date(iso).toLocaleDateString('en-IN',{
      year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'
    });
  } catch{ return iso; }
}

loadPrescription();
</script>
</body>
</html>
